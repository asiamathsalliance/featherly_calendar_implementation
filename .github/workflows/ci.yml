name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prisma / Next build — replace in hosting (Vercel etc.) with a real URL
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/featherly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
